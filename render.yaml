services:
  - type: web
    name: mothercare
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn Mother.wsgi:application
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mothercare-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: "*.render.com"

databases:
  - name: mothercare-db
    plan: free
    region: oregon
